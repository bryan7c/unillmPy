name: Deploy OmniBridge AI API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted 

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build e Run OmniBridge
        run: |
          # 1. Limpeza preventiva
          docker stop omnibridge || true && docker rm omnibridge || true
          
          # 2. Build com caminho específico
          # -f indica onde está o Dockerfile
          # o "." no final diz que o contexto de build é a raiz (para o Docker ver todas as pastas)
          docker build -t omnibridge:latest -f gateway-api/Dockerfile .
          
          # 3. Execução
          # Verifique se a porta da sua API dentro do container é a 8000
          docker run -d \
            --name omnibridge \
            --restart unless-stopped \
            -p 8000:8000 \
            omnibridge:latest

      - name: Prune images
        run: docker image prune -f