name: Deploy OmniBridge AI API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted 

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # DEBUG: Isso vai listar os arquivos no log para sabermos onde o Dockerfile está
      - name: Listar arquivos (Debug)
        run: ls -R

      - name: Build e Run OmniBridge
        run: |
          # 1. Parar e remover (silenciosamente)
          docker stop omnibridge || true && docker rm omnibridge || true
          
          # 2. Buildar a imagem
          # Se o seu Dockerfile estiver em uma pasta, mude o "." para "./pasta" 
          # ou use: -f ./caminho/do/Dockerfile .
          docker build -t omnibridge:latest .
          
          # 3. Rodar o container
          docker run -d \
            --name omnibridge \
            --restart unless-stopped \
            -p 8000:8000 \
            omnibridge:latest