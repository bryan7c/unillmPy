version: "3.9"

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: omnibridge-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    env_file:
      - ./.env
    command: [ "--config", "/app/config.yaml", "--port", "4000", "--detailed_debug" ]
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: omnibridge-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
