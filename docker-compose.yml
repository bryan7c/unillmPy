version: "3.9"

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: omnibridge-litellm
    ports:
      - "4007:4007"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    env_file:
      - ./.env
    command: [ "--config", "/app/config.yaml", "--port", "4007", "--detailed_debug" ]
    restart: unless-stopped
    networks:
      - default
      - homelab_shared

  gateway-api:
    build:
      context: ./gateway-api
      dockerfile: Dockerfile
    container_name: omnibridge-api
    ports:
      - "3001:3001"
    env_file:
      - ./gateway-api/.env
    restart: unless-stopped
    networks:
      - default
      - homelab_shared

networks:
  default:
    name: omnibridge_default
    external: true
  homelab_shared:
    name: homelab_shared
    external: true
