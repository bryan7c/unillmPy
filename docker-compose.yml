version: "3.9"

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: omnibridge-litellm
    ports:
      - "4007:4007"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    env_file:
      - ./.env
    command: [ "--config", "/app/config.yaml", "--port", "4007", "--detailed_debug" ]
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: omnibridge-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  gateway-api:
    build:
      context: ./gateway-api
      dockerfile: Dockerfile.dev
    container_name: omnibridge-api
    ports:
      - "3001:3001"
    volumes:
      - ./gateway-api:/app
      - /app/node_modules
      - ./litellm:/app/litellm
    env_file:
      - ./gateway-api/.env
    environment:
      - NODE_ENV=development
      - LITELLM_CONFIG_PATH=/app/litellm/config.yaml
    depends_on:
      - redis
    restart: always
